<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Uma pequena homenagem ❤️</title>

    <!-- Google Fonts -->

    <link rel="preconnect"
        href="https://fonts.googleapis.com">

    <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <!-- CSS -->

    <link
       rel="stylesheet" href="css/style.css">

</head>

<body>

    <!-- ===================================================
        TELA DE BOAS-VINDAS
==================================================== -->

<section id="inicio">

    <div class="inicio-container">

        <h1>

            Para uma pessoa muito especial

        </h1>

        <p>

            Algumas pessoas passam pela nossa vida e deixam
            lembranças que jamais serão esquecidas.

        </p>

        <button id="btnInicio">

            Abrir surpresa 💌

        </button>

    </div>

</section>

<!-- ===================================================
                ENVELOPE
==================================================== -->

<section id="envelope-section" class="hidden">

    <div class="envelope-container">

        <div class="envelope" id="envelope">

            <div class="envelope-back"></div>

            <div class="letter-preview"></div>

            <div class="envelope-left"></div>

            <div class="envelope-right"></div>

            <div class="envelope-bottom"></div>

            <div class="envelope-top"></div>

            <div class="seal">💗</div>

        </div>

        <p>Clique no envelope para abrir a carta</p>

    </div>

</section>

<!-- ===================================================
                    CARTA
==================================================== -->

<section
    id="carta-section"
    class="hidden">

    <div class="carta">

        <div id="textoCarta"></div>

        <button
            id="btnFotos">

            Ver nossas lembranças 📷

        </button>

    </div>

</section>

<script src="js/script.js"></script>

</body>
</html>
